# Project Configuration for Superstore Sales Data Mining

project:
  name: "Superstore Sales Analysis"
  version: "1.0"
  description: "Data mining project for supermarket sales analysis"

random_seed: 42

# Data paths
paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  output_figures: "outputs/figures/"
  output_tables: "outputs/tables/"
  output_models: "outputs/models/"
  output_reports: "outputs/reports/"

# EDA and Preprocessing
preprocessing:
  # Missing values handling
  missing_strategy:
    numeric: "median"  # mean, median, mode
    categorical: "mode"
    threshold: 0.3  # drop columns with >30% missing

  # Outlier handling
  outlier_strategy: "iqr"  # iqr, zscore
  outlier_threshold: 3.0

  # Encoding
  encoding:
    categorical: "label"  # label, onehot, target
    high_cardinality: "frequency"  # frequency, target

  # Scaling
  scaling:
    method: "standard"  # standard, minmax, robust

# Feature Engineering
features:
  # RFM parameters
  rfm:
    recency_days: 365  # reference date for recency
    n_bins: 5

  # Basket creation for association
  basket:
    min_items: 2
    min_order_value: 10

# Mining Parameters
mining:
  # Association Rules
  association:
    min_support: 0.01
    min_confidence: 0.3
    min_lift: 1.0
    max_itemset_size: 3

  # Clustering
  clustering:
    k_range: [2, 10]
    method: "kmeans"  # kmeans, hac, dbscan
    scaler: "standard"

  # Evaluation metrics
  silhouette_threshold: 0.3

# Modeling
models:
  # Classification
  classification:
    test_size: 0.2
    cv_folds: 5
    random_state: 42
    
  # Baseline models
  baselines:
    - "LogisticRegression"
    - "DecisionTree"
  
  # Improved models
  improved:
    - "RandomForest"
  
  # Hyperparameters
  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: "lbfgs"
  
  decision_tree:
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
  
  random_forest:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 5
    min_samples_leaf: 2
    n_jobs: -1

  # Forecasting
  forecasting:
    test_size: 0.2
    freq: "W"  # weekly data
    models:
      - "ARIMA"
      - "HoltWinters"
      - "Prophet"
    arima_params:
      p: [0, 1, 2]
      d: [0, 1]
      q: [0, 1, 2]
    holt_winters:
      seasonal: "add"
      seasonal_periods: 12

# Evaluation Metrics
metrics:
  classification:
    - "accuracy"
    - "f1_macro"
    - "f1_weighted"
    - "roc_auc"
    - "precision"
    - "recall"
  
  regression:
    - "mae"
    - "rmse"
    - "mape"
    - "smape"
  
  clustering:
    - "silhouette"
    - "davies_bouldin"
    - "calinski_harabasz"

# Visualization
visualization:
  style: "seaborn"
  color_palette: "Set2"
  figsize: [12, 8]
  dpi: 150
  save_format: "png"

# Streamlit App
app:
  title: "Superstore Sales Dashboard"
  page_icon: "🛒"
  layout: "wide"